name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: darwin-arm64
          - runner: macos-13
            target: darwin-x64
          - runner: ubuntu-latest
            target: linux-x64
          - runner: ubuntu-24.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run package:check
      - run: bun run package:release
        env:
          OPENDUNGEON_RELEASE_TARGETS: ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/release/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          merge-multiple: true
      - run: |
          mkdir -p dist/release
          cp dist/artifacts/*.tar.gz dist/release/
          cd dist/release
          sha256sum *.tar.gz > SHA256SUMS
      - run: bun run scripts/render-package-manager-files.ts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*.tar.gz
            dist/release/SHA256SUMS
            dist/release/opendungeon.rb
            dist/release/PKGBUILD
